<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yem Do'kon Tizimi</title>
  <link rel="stylesheet" href="style.css">
<!-- PWA ulanishi -->
<link rel="manifest" href="manifest.json">
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log("SW xatosi:", err));
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1107; --surface: #1a1f0a; --surface2: #232910;
    --accent: #c8e63c; --accent2: #8faf1a; --text: #e8f0c0;
    --muted: #6b7a3a; --danger: #e63c3c; --success: #3ce6a0;
    --warning: #e6a83c; --border: #2e3818;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px; min-height: 100vh; padding-bottom: 80px; }
  header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 16px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-family: 'Unbounded', sans-serif; font-size: 16px; color: var(--accent); letter-spacing: 1px; }
  header p { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { flex: 1; min-width: 75px; padding: 12px 6px; text-align: center; font-size: 10px; color: var(--muted); cursor: pointer; border: none; background: none; font-family: 'IBM Plex Mono', monospace; transition: all 0.2s; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface2); }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .page { display: none; padding: 16px; }
  .page.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .card-title { font-family: 'Unbounded', sans-serif; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 10px; outline: none; }
  .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px; font-family: 'Unbounded', sans-serif; font-size: 12px; cursor: pointer; margin-bottom: 8px; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-excel { background: #3ce6a0; color: #0f1107; font-weight: bold; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px; font-size: 10px; width: auto; margin-top: 5px; }
  .product-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .log-item { border-left: 3px solid var(--border); padding: 10px; margin-bottom: 8px; background: var(--surface2); }
  .log-item.kirish { border-left-color: var(--success); }
  .log-item.chiqish { border-left-color: var(--danger); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .stat-card.full { grid-column: 1 / -1; }
  .stat-value { font-family: 'Unbounded', sans-serif; font-size: 16px; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 5px; }
</style>
</head>
<body>

<header>
  <h1>🌾 YEM DO'KON</h1>
  <p>Tizim yangilandi (v4)</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('bosh', this)"><span class="tab-icon">📊</span>Bosh</button>
  <button class="tab" onclick="showTab('mahsulot', this)"><span class="tab-icon">📦</span>Tovar</button>
  <button class="tab" onclick="showTab('kirim', this)"><span class="tab-icon">⬇️</span>Kirim</button>
  <button class="tab" onclick="showTab('chiqim', this)"><span class="tab-icon">⬆️</span>Sotish</button>
  <button class="tab" onclick="showTab('foyda', this)"><span class="tab-icon">💰</span>Foyda</button>
  <button class="tab" onclick="showTab('tarix', this)"><span class="tab-icon">📋</span>Tarix</button>
  <button class="tab" onclick="showTab('zaxira', this)"><span class="tab-icon">⚙️</span>Zaxira</button>
</div>

<!-- SAHIFALAR -->
<div id="tab-bosh" class="page active">
  <div class="stats-grid" id="stats-container"></div>
  <div class="card">
    <div class="card-title">📦 Ombordagi qoldiqlar</div>
    <div id="bosh-qoldiq-list"></div>
  </div>
</div>

<div id="tab-mahsulot" class="page">
  <div class="card">
    <div class="card-title">➕ Yangi mahsulot turi</div>
    <input type="text" id="mah-nom" placeholder="Masalan: Bug'doy">
    <select id="mah-u">
      <option value="kg">O'lchov: KG</option>
      <option value="qop">O'lchov: QOP</option>
    </select>
    <button class="btn btn-primary" onclick="addM()">QO'SHISH</button>
  </div>
  <div id="mah-list"></div>
</div>

<div id="tab-kirim" class="page">
  <div class="card">
    <div class="card-title">⬇️ Omborga kirim</div>
    <select id="k-mah"></select>
    <input type="number" id="k-miqdor" placeholder="Miqdori">
    <input type="number" id="k-narx" placeholder="Xarid narxi (jami)">
    <input type="date" id="k-sana">
    <button class="btn btn-primary" onclick="doK()">KIRIM QILISH</button>
  </div>
</div>

<div id="tab-chiqim" class="page">
  <div class="card">
    <div class="card-title">⬆️ Sotish</div>
    <select id="s-mah"></select>
    <input type="number" id="s-miqdor" placeholder="Miqdori">
    <input type="number" id="s-narx" placeholder="Sotuv narxi (jami)">
    <input type="date" id="s-sana">
    <button class="btn btn-primary" onclick="doS()">SOTUVNI SAQLASH</button>
  </div>
</div>

<div id="tab-foyda" class="page"><div id="foyda-content"></div></div>
<div id="tab-tarix" class="page"><div id="log-list"></div></div>

<div id="tab-zaxira" class="page">
  <div class="card">
    <div class="card-title">💾 Hisobot va Zaxira</div>
    <button class="btn btn-excel" onclick="exportToExcel()">📊 EXCELGA YUKLASH (.CSV)</button>
    <button class="btn btn-outline" onclick="exportJSON()">📂 ZAXIRA NUSXA OLISH (.JSON)</button>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
    <div class="card-title">📥 Ma'lumotlarni qayta tiklash</div>
    <input type="file" id="import-file" style="display:none" onchange="importJSON(event)">
    <button class="btn" style="background:var(--surface2); color:var(--text); border:1px solid var(--border);" onclick="document.getElementById('import-file').click()">FAYLDAN YUKLASH</button>
  </div>
</div>

<script>
  let DB = JSON.parse(localStorage.getItem('yem_v4')) || { m: [], l: [] };

  function save() { localStorage.setItem('yem_v4', JSON.stringify(DB)); }

  function showTab(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
    if(id === 'bosh') renBosh();
    if(id === 'mahsulot') renM();
    if(id === 'kirim') fillS('k-mah');
    if(id === 'chiqim') fillS('s-mah');
    if(id === 'foyda') renF();
    if(id === 'tarix') renL();
  }

  function addM() {
    const n = document.getElementById('mah-nom').value.trim();
    const u = document.getElementById('mah-u').value;
    if(!n) return;
    DB.m.push({ id: Date.now(), n, u, qoldiq: 0 });
    save(); renM();
    document.getElementById('mah-nom').value = '';
  }

  function fillS(id) {
    const s = document.getElementById(id);
    s.innerHTML = '<option value="">— Tanlang —</option>' + 
      DB.m.map(x => `<option value="${x.id}">${x.n}</option>`).join('');
    document.getElementById('k-sana').valueAsDate = new Date();
    document.getElementById('s-sana').valueAsDate = new Date();
  }

  function doK() {
    const mid = document.getElementById('k-mah').value;
    const miq = parseFloat(document.getElementById('k-miqdor').value);
    const narx = parseFloat(document.getElementById('k-narx').value) || 0;
    if(!mid || !miq) return;
    const mah = DB.m.find(x => x.id == mid);
    mah.qoldiq += miq;
    DB.l.unshift({ t: 'k', m: mah.n, q: miq, n: narx, d: document.getElementById('k-sana').value });
    save(); alert('Kirim bajarildi'); renBosh(); showTab('bosh', document.querySelectorAll('.tab')[0]);
  }

  function doS() {
    const mid = document.getElementById('s-mah').value;
    const miq = parseFloat(document.getElementById('s-miqdor').value);
    const narx = parseFloat(document.getElementById('s-narx').value) || 0;
    if(!mid || !miq) return;
    const mah = DB.m.find(x => x.id == mid);
    if(mah.qoldiq < miq) return alert('Omborda yetarli emas!');
    mah.qoldiq -= miq;
    DB.l.unshift({ t: 's', m: mah.n, q: miq, n: narx, d: document.getElementById('s-sana').value });
    save(); alert('Sotildi'); renBosh(); showTab('bosh', document.querySelectorAll('.tab')[0]);
  }

  function exportToExcel() {
    let csv = "﻿Turi,Mahsulot,Miqdori,Narxi,Sana
";
    DB.l.forEach(x => {
      csv += `${x.t === 'k' ? 'Kirim' : 'Sotish'},${x.m},${x.q},${x.n},${x.d}
`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `yem_hisobot.csv`;
    link.click();
  }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `yem_backup.json`;
    link.click();
  }

  function importJSON(event) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const json = JSON.parse(e.target.result);
        if(confirm("Eski ma'lumotlar o'chadi. Rozimisiz?")) {
          DB = json; save(); location.reload();
        }
      } catch(err) { alert('Xato fayl'); }
    };
    reader.readAsText(event.target.files[0]);
  }

  function renBosh() {
    const x = DB.l.filter(x => x.t === 'k').reduce((a, b) => a + b.n, 0);
    const t = DB.l.filter(x => x.t === 's').reduce((a, b) => a + b.n, 0);
    document.getElementById('stats-container').innerHTML = `
      <div class="stat-card"><div class="stat-value">${DB.m.length}</div><div class="stat-label">Turlar</div></div>
      <div class="stat-card"><div class="stat-value">${DB.l.length}</div><div class="stat-label">Amallar</div></div>
      <div class="stat-card full"><div class="stat-value">${(t-x).toLocaleString()} so'm</div><div class="stat-label">Sof Foyda</div></div>
    `;
    document.getElementById('bosh-qoldiq-list').innerHTML = DB.m.map(x => `
      <div class="product-item"><b>${x.n}</b>: ${x.qoldiq} ta/kg</div>
    `).join('') || 'Bo'sh';
  }

  function renM() {
    document.getElementById('mah-list').innerHTML = DB.m.map(x => `
      <div class="product-item"><b>${x.n}</b> (${x.u}) <button class="btn-danger" onclick="delM(${x.id})">O'chirish</button></div>
    `).join('');
  }
  function delM(id) { if(confirm('Ochirish?')) { DB.m = DB.m.filter(x => x.id != id); save(); renM(); } }

  function renL() {
    document.getElementById('log-list').innerHTML = DB.l.map(x => `
      <div class="log-item ${x.t === 'k' ? 'kirish' : 'chiqish'}">
        <b>${x.t === 'k' ? 'Kirim' : 'Sotuv'}</b>: ${x.m} | ${x.q} dona | ${x.n.toLocaleString()} so'm | ${x.d}
      </div>
    `).join('');
  }

  function renF() {
    const x = DB.l.filter(x => x.t === 'k').reduce((a, b) => a + b.n, 0);
    const t = DB.l.filter(x => x.t === 's').reduce((a, b) => a + b.n, 0);
    document.getElementById('foyda-content').innerHTML = `
      <div class="card">
        <h3>Xarajat: ${x.toLocaleString()}</h3>
        <h3>Tushum: ${t.toLocaleString()}</h3>
        <hr>
        <h2>Foyda: ${(t-x).toLocaleString()} so'm</h2>
      </div>
    `;
  }

  window.onload = renBosh;
</script>
</body>
</html>
