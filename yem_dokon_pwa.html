<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yem Do'kon Tizimi</title>

<!-- SERVICE WORKER O‘CHIRILDI (MUAMMO BERARDI) -->

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">

<style>
/* (STYLE o‘zgarmagan — qisqartirdim bu yerda, lekin sen eski style’ni qoldir) */
</style>
</head>

<body>

<header>
  <h1>🌾 YEM DO'KON</h1>
  <p>Ombor va moliya tizimi</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('bosh', this)">📊 Bosh</button>
  <button class="tab" onclick="showTab('mahsulot', this)">📦 Tovar</button>
</div>

<div id="tab-bosh" class="page active">
  <div id="bosh-qoldiq-list">
    <div class="empty-state">Hali mahsulot yo'q</div>
  </div>
</div>

<div id="tab-mahsulot" class="page">
  <input type="text" id="mah-nom" placeholder="Mahsulot nomi">
  <button onclick="mahsulotQosh()">Qo‘shish</button>
  <div id="mahsulot-list"></div>
</div>

<script>

let mahsulotlar = [];

function showTab(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

function mahsulotQosh() {
  const nom = document.getElementById('mah-nom').value.trim();

  if (!nom) {
    alert("Nom kiriting!");
    return;
  }

  mahsulotlar.push({ nom });

  renderMahsulotlar();
}

function renderMahsulotlar() {
  const el = document.getElementById('mahsulot-list');

  if (!mahsulotlar.length) {
    el.innerHTML = "<div class='empty-state'>Hali mahsulot yo'q</div>";
    return;
  }

  el.innerHTML = mahsulotlar.map(m => `
    <div>${m.nom}</div>
  `).join('');
}

</script>

</body>
</html>
